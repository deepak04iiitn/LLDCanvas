<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Indigo rounded square background -->
  <rect width="32" height="32" rx="7" fill="#4F46E5"/>
  <!-- UML class box shape: header bar + body -->
  <rect x="6" y="8" width="20" height="5" rx="1.5" fill="white" opacity="0.9"/>
  <rect x="6" y="14" width="20" height="10" rx="1.5" fill="white" opacity="0.3"/>
  <rect x="6" y="14" width="20" height="10" rx="1.5" stroke="white" stroke-width="1" opacity="0.6"/>
  <!-- Divider lines inside body -->
  <line x1="6" y1="18" x2="26" y2="18" stroke="white" stroke-width="0.8" opacity="0.5"/>
</svg>
